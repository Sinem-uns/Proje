services:

  postgres:
    image: postgres:16
    container_name: healthai_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: healthai_backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/healthai
      JWT_SECRET: supersecret
      PORT: 5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma db push && npx prisma db seed && npm run dev"

  frontend:
    build: ./frontend
    container_name: healthai_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: